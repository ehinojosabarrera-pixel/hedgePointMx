server {
    listen 80;
    server_name TU_DOMINIO.mx www.TU_DOMINIO.mx;

    # Landing page — archivos estáticos
    location / {
        root /home/hedgepoint/app/docs;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Dashboard FastAPI
    location /dashboard/ {
        proxy_pass http://127.0.0.1:8000/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Evitar que Nginx reescriba Location headers del backend
        proxy_redirect off;

        # Timeouts razonables para respuestas del LLM
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }
}
